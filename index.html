<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slots</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #1a002c; color: white; font-family: Arial; text-align: center; padding-top: 50px; }
        .machine { background: #000; border: 3px solid #ff007f; display: inline-block; padding: 20px; border-radius: 15px; }
        .reel { display: inline-block; width: 60px; height: 60px; font-size: 40px; background: white; margin: 5px; border-radius: 10px; line-height: 60px; color: black; }
        .btn { background: #ff007f; color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 20px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🎰 LUCKY SLOTS 🎰</h2>
    <div class="machine">
        <div id="r1" class="reel">🍒</div>
        <div id="r2" class="reel">🍋</div>
        <div id="r3" class="reel">7️⃣</div>
    </div>
    <br>
    <button class="btn" onclick="play()">SPIN!</button>
    <p id="res">Нажми SPIN!</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const items = ["🍒", "🍋", "7️⃣", "💎", "🍇"];

        function play() {
            document.getElementById("res").innerText = "🎰 Расчет...";
            
            // Мгновенно выбираем случайные эмодзи без зависающих таймеров
            const v1 = items[Math.floor(Math.random() * items.length)];
            const v2 = items[Math.floor(Math.random() * items.length)];
            const v3 = items[Math.floor(Math.random() * items.length)];
            
            document.getElementById("r1").innerText = v1;
            document.getElementById("r2").innerText = v2;
            document.getElementById("r3").innerText = v3;
            
            let status = "lose";
            let win = 0;
            
            if(v1 === v2 && v2 === v3) {
                if (v1 === "7️⃣") { status = "jackpot"; win = 1500; }
                else { status = "win3"; win = 500; }
                document.getElementById("res").innerText = "🎉 ПОБЕДА!";
            } else if(v1 === v2 || v2 === v3 || v1 === v3) {
                status = "win2"; win = 150;
                document.getElementById("res").innerText = "💵 СОВПАДЕНИЕ!";
            } else {
                document.getElementById("res").innerText = "😢 ПУСТО";
            }
            
            // Через секунду закрываем окно и передаем данные боту
            setTimeout(() => {
                tg.sendData(`webapp_slots:${status}:${win}`);
                tg.close();
            }, 1000);
        }
    </script>
</body>
</html>
