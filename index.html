<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Slots</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            background: #150024;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .machine {
            background: #000;
            border: 4px solid #ff007f;
            display: inline-block;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 20px #ff007f;
        }
        .reel {
            display: inline-block;
            width: 70px;
            height: 70px;
            background: #fff;
            margin: 10px;
            border-radius: 10px;
            font-size: 45px;
            line-height: 70px;
        }
        .btn {
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff007f;
            margin-top: 25px;
        }
        #info {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>🎰 LUCKY NEON SLOTS 🎰</h2>
    
    <div class="machine">
        <div id="box1" class="reel">🍒</div>
        <div id="box2" class="reel">🍋</div>
        <div id="box3" class="reel">7️⃣</div>
    </div>
    
    <br>
    <button class="btn" onclick="startSpin()">SPIN!</button>
    
    <p id="info">Нажми кнопку, чтобы играть!</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем окно на максимум

        const symbols = ["🍒", "🍋", "7️⃣", "💎", "🍇"];

        function startSpin() {
            document.getElementById("info").innerText = "🎰 Барабаны крутятся...";
            
            let count = 0;
            // Запускаем быстрое переключение эмодзи в коробках
            const timer = setInterval(() => {
                document.getElementById("box1").innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById("box2").innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById("box3").innerText = symbols[Math.floor(Math.random() * symbols.length)];
                
                count++;
                
                // Останавливаем вращение через 10 шагов (1 секунда)
                if (count > 10) {
                    clearInterval(timer);
                    evaluateResult();
                }
            }, 100);
        }

        function evaluateResult() {
            const b1 = document.getElementById("box1").innerText;
            const b2 = document.getElementById("box2").innerText;
            const b3 = document.getElementById("box3").innerText;
            
            let status = "lose";
            let win = 0;

            if (b1 === b2 && b2 === b3) {
                if (b1 === "7️⃣") {
                    status = "jackpot"; win = 1500;
                    document.getElementById("info").innerText = "🎉 ДЖЕКПОТ! +1500 💰";
                } else {
                    status = "win3"; win = 500;
                    document.getElementById("info").innerText = "💥 ТРИ В РЯД! +500 💰";
                }
            } else if (b1 === b2 || b2 === b3 || b1 === b3) {
                status = "win2"; win = 150;
                document.getElementById("info").innerText = "💵 СОВПАЛИ ДВА! +150 💰";
            } else {
                document.getElementById("info").innerText = "😢 МИМО! ПОПРОБУЙ СНОВА!";
            }

            // Отправляем результат обратно в нашего Python-бота
            setTimeout(() => {
                tg.sendData("webapp_slots:" + status + ":" + win);
                tg.close(); // Закрываем окно
            }, 1500);
        }
    </script>
</body>
</html>
